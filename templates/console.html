{% extends 'base.html' %}

{% set page_title = 'Console' %}

{% block content %}
<div id="console-page">
  <div id="console-status" class="mb-3"></div>

  <div class="card mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-md-3">
          <label class="form-label">Severity</label>
          <select id="console-severity" class="form-select">
            <option value="">All</option>
            <option value="DEBUG">DEBUG</option>
            <option value="INFO">INFO</option>
            <option value="WARNING">WARNING</option>
            <option value="ERROR">ERROR</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Area / Module</label>
          <select id="console-module" class="form-select">
            <option value="">All</option>
            <option value="api">API</option>
            <option value="scheduler">Scheduler</option>
            <option value="timers">Timers</option>
            <option value="videohub">VideoHub</option>
            <option value="auth">Auth</option>
            <option value="automation">Automation</option>
          </select>
        </div>
        <div class="col-md-2">
          <button id="console-refresh" class="btn btn-primary w-100" type="button">Refresh</button>
        </div>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h2 class="h6">Persistent Logs</h2>
      <pre id="console-log" class="border rounded p-2 mb-0" style="height: 55vh; overflow: auto; white-space: pre-wrap;"></pre>
    </div>
  </div>
</div>
{% endblock %}
