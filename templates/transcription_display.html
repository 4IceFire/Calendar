<!doctype html>
<html lang="en" data-bs-theme="{{ bs_theme|default('light') }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Transcription Display • TDeck</title>
    <link rel="icon" type="image/svg+xml" href="/static/tdeck-icon.svg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
  </head>
  <body class="transcription-display-body">
    <main id="transcription-display-page" class="transcription-display-shell">
      <div id="transcription-display-flash" class="transcription-display-flash" aria-hidden="true"></div>
      <div class="transcription-display-header">
        <div>
          <div class="small text-uppercase text-muted">TDeck Live</div>
          <h1 class="h3 mb-0 tdeck-title">Church Comms</h1>
        </div>
        <div class="d-flex gap-2 flex-wrap align-items-center">
          <div id="transcription-display-server-badge" class="badge text-bg-secondary">Server Idle</div>
          <div id="transcription-display-client-badge" class="badge text-bg-secondary">Client Waiting</div>
        </div>
      </div>

      <section id="transcription-display-scroll" class="transcription-display-scroll">
        <div class="transcription-display-spacer"></div>
        <div id="transcription-display-segments" class="transcription-display-segments"></div>
        <section id="transcription-display-live-wrap" class="transcription-display-live-wrap">
          <div class="transcription-display-live-label">Live Now</div>
          <div id="transcription-display-live" class="transcription-display-live">Waiting for audio…</div>
          <div id="transcription-display-stabilized" class="transcription-display-stabilized"></div>
        </section>
      </section>
    </main>

    <script src="/static/app.js"></script>
  </body>
</html>
